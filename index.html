 <!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEBSP Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
      .container { max-width: 1000px; margin: 0 auto; }
      button { padding: 10px 20px; margin: 5px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
      button:hover { background: #764ba2; }
      .tab { display: none; background: white; padding: 20px; margin-top: 20px; border-radius: 5px; }
      .tab.active { display: block; }
      .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; background: #fafafa; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PEBSP Dashboard - Editais</h1>
      <button onclick="show('p')">Pendentes</button>
      <button onclick="show('d')">Processados</button>
      <button onclick="show('o')">Inscrições Abertas</button>

      <div id="p" class="tab active"><p>Carregando...</p></div>
      <div id="d" class="tab"><p>Carregando...</p></div>
      <div id="o" class="tab"><p>Carregando...</p></div>
    </div>

    <script>
      function show(id) {
        document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      }

      const apiUrl = 'https://script.google.com/macros/s/AKfycbw2ImX5WCErtSAGkah1ZFiDpV8UOZAFxw6E_Mh7DV7oo5dHZuxMwFhnwFpSbsVl3SA/exec';

      fetch(apiUrl)
        .then(r => r.json())
        .then(data => {
          let html1 = '';
          if(data.pending) {
            data.pending.forEach(e => {
              html1 += '<div class="card"><strong>' + e.name + '</strong><br>Tamanho: ' + e.size + '<br>Data: ' + new Date(e.created).toLocaleDateString('pt-BR') + '</div>';
            });
          }
          document.getElementById('p').innerHTML = html1 || '<p>Nenhum editais pendentes</p>';

        let html2 = '';
        if(data.done) {
          data.done.forEach(e => {
            html2 += '<div class="card"><strong>' + e.name + '</strong><br>Tamanho: ' + e.size + '<br>Data: ' + new Date(e.created).toLocaleDateString('pt-BR') + '</div>';
          });
        }
        document.getElementById('d').innerHTML = html2 || '<p>Nenhum editais processados</p>';
      })
      .catch(e => {
        document.getElementById('p').innerHTML = '<p style="color:red;">Erro: ' + e + '</p>';
        document.getElementById('d').innerHTML = '<p style="color:red;">Erro: ' + e + '</p>';
      });
  </script>
</body>
</html>
